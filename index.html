<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus.AI | Socratic Tutor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #1a73e8; }
        button {
            background-color: #1a73e8;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #1557b0; }
        .response {
            margin-top: 30px;
            padding: 15px;
            background-color: #e8f0fe;
            border-radius: 10px;
            color: #1967d2;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Nexus.AI</h1>
    <p>Your Socratic Learning Guide</p>

    <form action="/ask" method="post">
        <input type="text" name="question" placeholder="What are you thinking about?" required>
        <button type="submit">Ask Nexus</button>
    </form>

    {% if response %}
    <div class="response">
        <strong>Nexus says:</strong><br>
        {{ response }}
    </div>
    {% endif %}
</div> </body>
</html>
